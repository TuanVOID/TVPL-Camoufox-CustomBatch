services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    image: tvpl-camoufox-custom-batch:latest
    container_name: tvpl-camoufox-custom-batch
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      TESSERACT_CMD: /usr/bin/tesseract
      SKIP_CAMOUFOX_FETCH: "0"
    volumes:
      - ./config:/app/config
      - ./output:/app/output
      - ./logs:/app/logs
      - ./state:/app/state
    command:
      - python
      - run_custom_batch.py
      - --config
      - /app/config/custom_batch.json
      - --headless
    restart: "no"

